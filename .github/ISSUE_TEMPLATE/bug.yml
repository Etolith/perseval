name: Bug report
description: Report reproducible Perseval behavior without sharing private trace payloads.
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not attach credentials, customer data, prompts, tool payloads, or raw private traces.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the visible behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest synthetic or redacted reproduction you can.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Perseval version
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and hardware
      placeholder: macOS 15.5, Apple Silicon
    validations:
      required: true
