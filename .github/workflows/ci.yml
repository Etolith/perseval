name: CI

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  formatting:
    name: Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out Perseval
        uses: actions/checkout@v7

      - name: Install the pinned Rust toolchain
        run: rustup show active-toolchain

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: macOS Clippy
    runs-on: macos-15
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Check out Perseval
        uses: actions/checkout@v7

      - name: Install the pinned Rust toolchain
        run: rustup show active-toolchain

      - name: Restore Cargo build cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Run Clippy with warnings denied
        run: cargo clippy --workspace --all-targets -- -D warnings

  tests:
    name: macOS tests
    runs-on: macos-15
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Check out Perseval
        uses: actions/checkout@v7

      - name: Install the pinned Rust toolchain
        run: rustup show active-toolchain

      - name: Restore Cargo build cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Run the workspace test suite
        run: cargo test --workspace --locked
