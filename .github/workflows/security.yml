name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '23 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secrets:
    name: Secret history scan
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install checksum-pinned Gitleaks CLI
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --location --silent --show-error \
            --output "$RUNNER_TEMP/$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/$archive"
          echo "$GITLEAKS_LINUX_X64_SHA256  $RUNNER_TEMP/$archive" | sha256sum --check
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" gitleaks
      - name: Scan complete Git history
        run: |
          "$RUNNER_TEMP/gitleaks" git --redact --verbose .

  dependencies:
    name: Rust dependency advisories
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit the locked dependency graph
        # Both ignored advisories currently occur only in Linux display-backend
        # build dependencies (xcb and wayland-scanner). Perseval ships macOS only;
        # SECURITY.md records the exact boundary and removal condition.
        run: cargo audit --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
      - name: Export the dependency license inventory
        run: |
          cargo metadata --locked --format-version 1 |
            jq '[.packages[] | {name, version, license, license_file, source}]' > dependency-licenses.json
      - uses: actions/upload-artifact@v4
        with:
          name: dependency-license-inventory
          path: dependency-licenses.json
          if-no-files-found: error
