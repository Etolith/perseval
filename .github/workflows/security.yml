name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '23 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secrets:
    name: Secret history scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  dependencies:
    name: Rust dependency advisories
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit the locked dependency graph
        run: cargo audit --deny warnings
      - name: Export the dependency license inventory
        run: |
          cargo metadata --locked --format-version 1 |
            jq '[.packages[] | {name, version, license, license_file, source}]' > dependency-licenses.json
      - uses: actions/upload-artifact@v4
        with:
          name: dependency-license-inventory
          path: dependency-licenses.json
          if-no-files-found: error
